apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: chrono-vcs
  labels: { app.kubernetes.io/name: frontend, app.kubernetes.io/component: web }
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app.kubernetes.io/name: frontend }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: frontend
      terminationGracePeriodSeconds: 30
      # Next.js standalone runs as Chainguard nonroot (UID 65532). No nginx.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app.kubernetes.io/name: frontend }
      containers:
        - name: web
          image: frontend
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 3000, protocol: TCP }
          envFrom:
            - configMapRef: { name: frontend-config }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 10
          volumeMounts:
            # Next.js standalone writes a tiny runtime cache under .next/cache.
            - { name: next-cache, mountPath: /app/.next/cache }
            - { name: tmp,        mountPath: /tmp }
      volumes:
        - { name: next-cache, emptyDir: { sizeLimit: 128Mi } }
        - { name: tmp,        emptyDir: { sizeLimit: 16Mi  } }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: chrono-vcs
spec:
  type: ClusterIP
  selector: { app.kubernetes.io/name: frontend }
  ports:
    - { name: http, port: 3000, targetPort: http }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend
  namespace: chrono-vcs
spec:
  minAvailable: 1
  selector:
    matchLabels: { app.kubernetes.io/name: frontend }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: chrono-vcs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
