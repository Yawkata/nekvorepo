apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-service
  namespace: chrono-vcs
  labels: { app.kubernetes.io/name: workflow-service, app.kubernetes.io/component: backend }
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app.kubernetes.io/name: workflow-service }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workflow-service
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: workflow-service
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app.kubernetes.io/name: workflow-service }
      containers:
        - name: app
          image: workflow-service
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8000, protocol: TCP }
          envFrom:
            - configMapRef: { name: workflow-service-config }
            - secretRef:    { name: db-app-credentials }
            - secretRef:    { name: identity-misc }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          startupProbe:
            httpGet: { path: /ping, port: http }
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /ping, port: http }
            periodSeconds: 10
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-service
  namespace: chrono-vcs
spec:
  type: ClusterIP
  selector: { app.kubernetes.io/name: workflow-service }
  ports:
    - { name: http, port: 8000, targetPort: http }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: workflow-service
  namespace: chrono-vcs
spec:
  minAvailable: 1
  selector:
    matchLabels: { app.kubernetes.io/name: workflow-service }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workflow-service
  namespace: chrono-vcs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workflow-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
