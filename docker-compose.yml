services:
  database-migrations:
    build:
      context: .
      dockerfile: services/database-migrations/Dockerfile
    container_name: nekvo-migrator
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - chrono_network
    # No restart policy — migrator runs once and exits.
    # depends_on: service_completed_successfully ensures dependents only start
    # after this exits 0.

  init-db-roles:
    build:
      context: .
      dockerfile: services/database-migrations/Dockerfile
    container_name: nekvo-init-roles
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - IDENTITY_DB_PASSWORD=${IDENTITY_DB_PASSWORD}
      - REPO_DB_PASSWORD=${REPO_DB_PASSWORD}
      - WORKFLOW_DB_PASSWORD=${WORKFLOW_DB_PASSWORD}
    command: ["python", "/app/init_roles.py"]
    restart: "no"
    depends_on:
      database-migrations:
        condition: service_completed_successfully
    networks:
      - chrono_network
    # One-shot: creates identity_svc_user, repo_svc_user, workflow_svc_user
    # (or refreshes their passwords). Run manually or as part of first-deploy:
    #   docker-compose run --rm init-db-roles

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    container_name: identity-service
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      # Uses the least-privilege identity_svc_user (inherits identity_svc role).
      # Falls back to DATABASE_URL so the stack still works before init-db-roles
      # has been run (e.g. on a first pull without per-service users created yet).
      - DATABASE_URL=${IDENTITY_DATABASE_URL:-${DATABASE_URL}}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - SES_FROM_EMAIL=${SES_FROM_EMAIL:-}
      - SES_CONFIGURATION_SET_NAME=${SES_CONFIGURATION_SET_NAME:-}
      - WORKFLOW_SERVICE_URL=http://workflow-service:8000
      - REPO_SERVICE_URL=http://repo-service:8000
      # SNS topic ARN — publishes once; SNS fans out to all consumer service queues.
      - SNS_CACHE_INVALIDATION_TOPIC_ARN=${SNS_CACHE_INVALIDATION_TOPIC_ARN:-}
      - INVITE_ACCEPT_BASE_URL=${INVITE_ACCEPT_BASE_URL:-http://localhost:3000}
    depends_on:
      database-migrations:
        condition: service_completed_successfully
    networks:
      - chrono_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  workflow-service:
    build:
      context: .
      dockerfile: services/workflow-service/Dockerfile
    container_name: workflow-service
    ports:
      - "8002:8000"
    env_file: .env
    environment:
      # Uses the least-privilege workflow_svc_user (inherits workflow_svc role).
      - DATABASE_URL=${WORKFLOW_DATABASE_URL:-${DATABASE_URL}}
      - IDENTITY_SERVICE_URL=http://identity-service:8000
      - REPO_SERVICE_URL=http://repo-service:8000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_REPO_BUCKET=${S3_REPO_BUCKET}
      - SES_FROM_EMAIL=${SES_FROM_EMAIL}
      # Dedicated per-service queue — workflow-service is the sole consumer.
      - SQS_CACHE_INVALIDATION_QUEUE_URL=${WORKFLOW_CACHE_INVALIDATION_QUEUE_URL:-}
    depends_on:
      database-migrations:
        condition: service_completed_successfully
      identity-service:
        condition: service_healthy
      repo-service:
        condition: service_healthy
    networks:
      - chrono_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  repo-service:
    build:
      context: .
      dockerfile: services/repo-service/Dockerfile
    container_name: repo-service
    ports:
      - "8003:8000"
    env_file: .env
    environment:
      # Uses the least-privilege repo_svc_user (inherits repo_svc role).
      - DATABASE_URL=${REPO_DATABASE_URL:-${DATABASE_URL}}
      - IDENTITY_SERVICE_URL=http://identity-service:8000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_REPO_BUCKET=${S3_REPO_BUCKET}
      - SES_FROM_EMAIL=${SES_FROM_EMAIL}
      # Dedicated per-service queue — repo-service is the sole consumer.
      - SQS_CACHE_INVALIDATION_QUEUE_URL=${REPO_CACHE_INVALIDATION_QUEUE_URL:-}
      # EFS_DRAFTS_ROOT defaults to /mnt/efs/drafts inside the container.
      # Local:      host directory bind-mounted below for easy inspection.
      # Production: EFS CSI driver mounts at the same path — no code change needed.
    depends_on:
      database-migrations:
        condition: service_completed_successfully
      identity-service:
        condition: service_healthy
    volumes:
      - ./data/efs:/mnt/efs/drafts  # bind mount for local dev/testing
    networks:
      - chrono_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  chrono_network:
    driver: bridge
