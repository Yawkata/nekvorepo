name: 'Deploy chrono-vcs to EKS'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Pipeline action'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: chrono-vcs
  ENVIRONMENT: prod
  SSM_PREFIX: /chrono-vcs/prod
  CLUSTER_NAME: chrono-vcs-eks
  K8S_NAMESPACE: chrono
  TF_VAR_db_password:  ${{ secrets.TF_VAR_DB_PASSWORD }}
  TF_VAR_allowed_ips:  ${{ secrets.TF_VAR_ALLOWED_IPS }}
  TF_IN_AUTOMATION: "true"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. terraform plan — always runs. Outputs an artifact used by later jobs.
  # ─────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::064057453791:role/GitHubActions-OIDC-Role
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - run: terraform init -upgrade
      - run: terraform fmt -check -recursive
      - run: terraform validate
      - run: terraform plan -input=false -no-color -out=tfplan

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # 2. terraform apply — on push or manual apply. Writes every output to SSM
  #    so the in-cluster External Secrets Operator can sync them.
  # ─────────────────────────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: production
    defaults:
      run:
        working-directory: ./terraform
    outputs:
      ecr_registry: ${{ steps.outs.outputs.ecr_registry }}
      cluster_name: ${{ steps.outs.outputs.cluster_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::064057453791:role/GitHubActions-OIDC-Role
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - run: terraform init

      - uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Export outputs to SSM + generate per-service DB URLs
        id: outs
        run: |
          set -euo pipefail
          OUTS=$(terraform output -json)

          RDS=$(echo "$OUTS" | jq -r '.rds_endpoint.value')
          DB=chrono_vcs_db

          # Rotate per-service passwords every apply, store in SSM (SecureString).
          IDN_PW=$(openssl rand -base64 32 | tr -d '=+/' | head -c 24)
          REP_PW=$(openssl rand -base64 32 | tr -d '=+/' | head -c 24)
          WFL_PW=$(openssl rand -base64 32 | tr -d '=+/' | head -c 24)

          put() {
            aws ssm put-parameter --name "$1" --value "$2" --type "$3" \
              --overwrite --region "$AWS_REGION"
          }

          # Terraform outputs.
          put "$SSM_PREFIX/cognito_pool_id"                    "$(echo "$OUTS" | jq -r .cognito_pool_id.value)"                  String
          put "$SSM_PREFIX/cognito_client_id"                  "$(echo "$OUTS" | jq -r .cognito_client_id.value)"                String
          put "$SSM_PREFIX/cognito_client_secret"              "$(echo "$OUTS" | jq -r .cognito_client_secret.value)"            SecureString
          put "$SSM_PREFIX/s3_bucket_name"                     "$(echo "$OUTS" | jq -r .s3_bucket_name.value)"                   String
          put "$SSM_PREFIX/rds_endpoint"                       "$RDS"                                                            String
          put "$SSM_PREFIX/sns_cache_invalidation_topic_arn"   "$(echo "$OUTS" | jq -r .sns_cache_invalidation_topic_arn.value)" String
          put "$SSM_PREFIX/repo_cache_invalidation_queue_url"  "$(echo "$OUTS" | jq -r .repo_cache_invalidation_queue_url.value)" String
          put "$SSM_PREFIX/workflow_cache_invalidation_queue_url" "$(echo "$OUTS" | jq -r .workflow_cache_invalidation_queue_url.value)" String
          put "$SSM_PREFIX/ses_configuration_set_name"         "$(echo "$OUTS" | jq -r .ses_configuration_set_name.value)"       String
          put "$SSM_PREFIX/ses_from_email"                     "$(echo "$OUTS" | jq -r .ses_sender_email.value)"                 String
          # frontend_url is written by the deploy-k8s job once the ALB
          # hostname is known — seed a placeholder so the initial
          # ExternalSecrets sync doesn't fail on a missing key.
          if ! aws ssm get-parameter --name "$SSM_PREFIX/frontend_url" --region "$AWS_REGION" >/dev/null 2>&1; then
            put "$SSM_PREFIX/frontend_url" "http://pending-alb.invalid" String
          fi

          # Per-service passwords.
          put "$SSM_PREFIX/identity_db_password" "$IDN_PW" SecureString
          put "$SSM_PREFIX/repo_db_password"     "$REP_PW" SecureString
          put "$SSM_PREFIX/workflow_db_password" "$WFL_PW" SecureString

          # Admin DB URL — fetch secretsmanager password for migrator & init-roles.
          ADMIN_PW=$(aws secretsmanager get-secret-value \
            --secret-id "${PROJECT_NAME}-db-password" --query SecretString --output text)
          put "$SSM_PREFIX/database_url_admin" \
              "postgresql+psycopg://postgres_admin:${ADMIN_PW}@${RDS}:5432/${DB}?sslmode=require" SecureString

          # Per-service connection URLs.
          put "$SSM_PREFIX/identity_database_url" \
              "postgresql+psycopg://identity_svc_user:${IDN_PW}@${RDS}:5432/${DB}?sslmode=require" SecureString
          put "$SSM_PREFIX/repo_database_url" \
              "postgresql+psycopg://repo_svc_user:${REP_PW}@${RDS}:5432/${DB}?sslmode=require" SecureString
          put "$SSM_PREFIX/workflow_database_url" \
              "postgresql+psycopg://workflow_svc_user:${WFL_PW}@${RDS}:5432/${DB}?sslmode=require" SecureString

          # Passport signing key — generate once, keep stable across applies.
          if ! aws ssm get-parameter --name "$SSM_PREFIX/passport_secret_key" --region "$AWS_REGION" >/dev/null 2>&1; then
            put "$SSM_PREFIX/passport_secret_key" "$(openssl rand -hex 32)" SecureString
          fi

          # Surface values the next jobs need.
          REG=$(echo "$OUTS" | jq -r '.ecr_repository_urls.value["frontend"]' | cut -d/ -f1)
          echo "ecr_registry=$REG"          >> "$GITHUB_OUTPUT"
          echo "cluster_name=$(echo "$OUTS" | jq -r .cluster_name.value)" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Build + push every image to ECR in parallel.
  # ─────────────────────────────────────────────────────────────────────────
  build-push:
    name: Build & push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: terraform-apply
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - service: identity-service
            context: .
            dockerfile: services/identity-service/Dockerfile
          - service: repo-service
            context: .
            dockerfile: services/repo-service/Dockerfile
          - service: workflow-service
            context: .
            dockerfile: services/workflow-service/Dockerfile
          - service: database-migrations
            context: .
            dockerfile: services/database-migrations/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::064057453791:role/GitHubActions-OIDC-Role
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file:    ${{ matrix.dockerfile }}
          push:    true
          provenance: false
          tags: |
            ${{ needs.terraform-apply.outputs.ecr_registry }}/${{ env.PROJECT_NAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Render kustomize overlay and apply to the cluster.
  # ─────────────────────────────────────────────────────────────────────────
  deploy-k8s:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [terraform-apply, build-push]
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::064057453791:role/GitHubActions-OIDC-Role
          aws-region: ${{ env.AWS_REGION }}
      - name: Install kubectl + kustomize
        run: |
          curl -sSLo /usr/local/bin/kubectl https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl
          chmod +x /usr/local/bin/kubectl
          curl -sSL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/
      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: Wait for External Secrets CRDs
        run: |
          for i in {1..30}; do
            kubectl get crd clustersecretstores.external-secrets.io >/dev/null 2>&1 && break
            sleep 5
          done

      - name: Set image tags in kustomization
        working-directory: k8s/base
        env:
          REG: ${{ needs.terraform-apply.outputs.ecr_registry }}
        run: |
          for svc in frontend identity-service repo-service workflow-service database-migrations; do
            kustomize edit set image "$svc=$REG/$PROJECT_NAME/$svc:${{ github.sha }}"
          done

      # Jobs have an immutable pod template — re-applying an existing Job
      # fails with "spec.template: Invalid value". Delete any prior run's
      # Jobs so `kubectl apply` creates fresh ones this run.
      - name: Delete prior Jobs
        run: |
          kubectl -n "$K8S_NAMESPACE" delete job db-migrations init-db-roles \
            --ignore-not-found --wait=true

      - name: Apply base manifests (server-side)
        # Server-side apply tracks per-field ownership, so concurrent changes
        # from the AWS LB Controller (Ingress status/annotations) don't cause
        # "object has been modified" conflicts. --force-conflicts re-claims
        # any field we legitimately own that a controller last touched.
        run: |
          kustomize build k8s/base | \
            kubectl apply --server-side --force-conflicts --field-manager=github-actions -f -

      - name: Wait for db-migrations Job
        # Runs first — schema must exist before init-db-roles GRANTs on it.
        run: |
          kubectl -n "$K8S_NAMESPACE" wait --for=condition=complete job/db-migrations --timeout=10m || \
            (kubectl -n "$K8S_NAMESPACE" logs job/db-migrations --tail=200; exit 1)

      - name: Wait for init-db-roles Job
        # backoffLimit=3 means this tolerates starting before migrations
        # finish, but waiting for db-migrations first avoids the wasted retry.
        run: |
          kubectl -n "$K8S_NAMESPACE" wait --for=condition=complete job/init-db-roles --timeout=5m || \
            (kubectl -n "$K8S_NAMESPACE" logs job/init-db-roles --tail=200; exit 1)

      - name: Wait for rollouts
        run: |
          for d in identity-service repo-service workflow-service frontend; do
            kubectl -n "$K8S_NAMESPACE" rollout status deploy/"$d" --timeout=10m
          done

      # The ALB DNS only exists after the AWS LB Controller reconciles the
      # Ingress, so we patch SSM here (not in terraform). External Secrets
      # then refreshes the Secret and we restart pods so they read the new
      # value from env. Destroy purges all $SSM_PREFIX/* params, so this
      # leaves no orphan state.
      - name: Resolve ALB hostname and patch frontend_url
        run: |
          set -euo pipefail
          ALB=""
          for i in {1..60}; do
            ALB=$(kubectl -n "$K8S_NAMESPACE" get ingress chrono \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            [ -n "$ALB" ] && break
            echo "Waiting for ALB hostname…"
            sleep 10
          done
          if [ -z "$ALB" ]; then
            echo "Ingress never received an ALB hostname" >&2
            kubectl -n "$K8S_NAMESPACE" describe ingress chrono || true
            exit 1
          fi

          URL="http://$ALB"
          echo "Resolved frontend URL: $URL"

          CURRENT=$(aws ssm get-parameter --name "$SSM_PREFIX/frontend_url" \
            --query Parameter.Value --output text --region "$AWS_REGION" 2>/dev/null || echo "")
          if [ "$CURRENT" = "$URL" ]; then
            echo "frontend_url already current — skipping restart."
            exit 0
          fi

          aws ssm put-parameter --name "$SSM_PREFIX/frontend_url" \
            --value "$URL" --type String --overwrite --region "$AWS_REGION"

          # Force ExternalSecret refresh so the Secret is rewritten now,
          # then bounce pods so they pick up the new env value.
          kubectl -n "$K8S_NAMESPACE" annotate externalsecret chrono-shared \
            force-sync="$(date +%s)" --overwrite || true
          kubectl -n "$K8S_NAMESPACE" rollout restart \
            deploy/identity-service deploy/repo-service deploy/workflow-service deploy/frontend
          for d in identity-service repo-service workflow-service frontend; do
            kubectl -n "$K8S_NAMESPACE" rollout status deploy/"$d" --timeout=10m
          done

      - name: Print ingress URL
        run: kubectl -n "$K8S_NAMESPACE" get ingress chrono -o wide

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Destroy path — K8s cleanup FIRST (so LB-controller releases the ALB
  #    and ENIs), then terraform destroy.
  # ─────────────────────────────────────────────────────────────────────────
  destroy-k8s:
    name: Destroy — drain Kubernetes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::064057453791:role/GitHubActions-OIDC-Role
          aws-region: ${{ env.AWS_REGION }}
      - name: Install kubectl + helm
        run: |
          curl -sSLo /usr/local/bin/kubectl https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl
          chmod +x /usr/local/bin/kubectl
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Configure kubeconfig (skip if cluster gone)
        id: kube
        continue-on-error: true
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: Delete Ingress first — releases the ALB + ENIs
        if: steps.kube.outcome == 'success'
        run: |
          kubectl -n "$K8S_NAMESPACE" delete ingress --all --ignore-not-found --timeout=5m || true

      - name: Delete Services of type LoadBalancer
        if: steps.kube.outcome == 'success'
        run: |
          kubectl get svc -A -o json | jq -r \
            '.items[] | select(.spec.type=="LoadBalancer") | "\(.metadata.namespace) \(.metadata.name)"' | \
            while read ns name; do kubectl -n "$ns" delete svc "$name" --ignore-not-found --timeout=5m; done

      - name: Delete application namespace (clears PVCs/EFS APs)
        if: steps.kube.outcome == 'success'
        run: |
          kubectl delete namespace "$K8S_NAMESPACE" --ignore-not-found --timeout=10m || true

      - name: Wait for load-balancer cleanup
        if: steps.kube.outcome == 'success'
        run: |
          for i in {1..60}; do
            COUNT=$(aws elbv2 describe-load-balancers --region "$AWS_REGION" \
              --query "LoadBalancers[?contains(LoadBalancerName, 'k8s-')].LoadBalancerArn" \
              --output text | wc -w)
            if [ "$COUNT" = "0" ]; then echo "LBs drained"; break; fi
            echo "Waiting for $COUNT LB(s) to drain…"
            sleep 10
          done

      # Strip finalizers from CRs that block namespace teardown once their
      # operator goes away. Helm-uninstall the operators while they're still
      # online so CRDs unwind cleanly, THEN delete the namespaces. If we let
      # terraform do this, it tears down the operator first and the orphaned
      # CRs hang the namespace forever (5-min provider timeout, then
      # "context deadline exceeded").
      # Stale aggregated APIServices (metrics.k8s.io is the usual offender)
      # break namespace teardown with NamespaceDeletionDiscoveryFailure even
      # when no finalizers remain, because the namespace controller refuses
      # to finalize while API discovery is incomplete. Delete any
      # APIServices whose backing service is gone or whose Available
      # condition is False before we touch namespaces.
      - name: Remove broken aggregated APIServices
        if: steps.kube.outcome == 'success'
        run: |
          kubectl get apiservices -o json | jq -r \
            '.items[] | select(.spec.service != null) |
              select((.status.conditions // []) | any(.type=="Available" and .status!="True")) |
              .metadata.name' | \
            while read svc; do
              echo "Deleting broken APIService $svc"
              kubectl delete apiservice "$svc" --ignore-not-found
            done

      - name: Drain external-secrets + helm releases
        if: steps.kube.outcome == 'success'
        run: |
          set -euo pipefail

          # Remove finalizers on any leftover ExternalSecrets / SecretStores
          # so helm uninstall + namespace delete don't get stuck.
          for kind in externalsecrets clustersecretstores secretstores clusterexternalsecrets; do
            if kubectl get crd "${kind}.external-secrets.io" >/dev/null 2>&1; then
              kubectl get "$kind" -A -o json 2>/dev/null | jq -r \
                '.items[] | "\(.metadata.namespace // "-") \(.metadata.name)"' | \
                while read ns name; do
                  if [ "$ns" = "-" ]; then
                    kubectl patch "$kind" "$name" --type=merge \
                      -p '{"metadata":{"finalizers":null}}' || true
                  else
                    kubectl -n "$ns" patch "$kind" "$name" --type=merge \
                      -p '{"metadata":{"finalizers":null}}' || true
                  fi
                done
            fi
          done

          # Helm-uninstall in dependency order. Ignore "release not found".
          for r in external-secrets aws-load-balancer-controller cluster-autoscaler; do
            ns="kube-system"
            [ "$r" = "external-secrets" ] && ns="external-secrets"
            helm -n "$ns" uninstall "$r" --wait --timeout 5m 2>/dev/null || true
          done

          # Delete the namespaces we manage from terraform. Force-strip
          # finalizers if a namespace hangs in Terminating.
          for ns in external-secrets "$K8S_NAMESPACE"; do
            kubectl delete namespace "$ns" --ignore-not-found --timeout=3m || true
            if kubectl get namespace "$ns" >/dev/null 2>&1; then
              echo "Namespace $ns stuck — stripping finalizers."
              kubectl get namespace "$ns" -o json | \
                jq '.spec.finalizers = []' | \
                kubectl replace --raw "/api/v1/namespaces/$ns/finalize" -f - || true
            fi
          done

  terraform-destroy:
    name: Terraform destroy
    runs-on: ubuntu-latest
    needs: destroy-k8s
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: production
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::064057453791:role/GitHubActions-OIDC-Role
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - run: terraform init

      # RDS has deletion_protection=true (production-correct). Flip it off
      # in-place so destroy can proceed when the operator explicitly asks.
      # Tolerant of "instance already gone" — the previous destroy run may
      # have deleted it before failing on a later resource.
      - name: Disable RDS deletion protection
        run: |
          set -euo pipefail
          if ! aws rds describe-db-instances \
                --db-instance-identifier "${PROJECT_NAME}-db" \
                --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "RDS instance ${PROJECT_NAME}-db already gone — skipping."
            exit 0
          fi
          aws rds modify-db-instance \
            --db-instance-identifier "${PROJECT_NAME}-db" \
            --no-deletion-protection \
            --apply-immediately \
            --region "$AWS_REGION"
          aws rds wait db-instance-available \
            --db-instance-identifier "${PROJECT_NAME}-db" \
            --region "$AWS_REGION"

      # Cognito user pool — deletion_protection=ACTIVE blocks DeleteUserPool.
      # update-user-pool on a PLUS-tier pool requires --user-pool-add-ons
      # (threat protection is mandatory there), otherwise the call returns
      # InvalidParameterException. We also poll until the change propagates
      # before letting terraform destroy try to delete the pool.
      - name: Disable Cognito deletion protection
        run: |
          set -euo pipefail
          POOL_ID=$(aws ssm get-parameter --name "$SSM_PREFIX/cognito_pool_id" \
            --query Parameter.Value --output text --region "$AWS_REGION" 2>/dev/null || echo "")
          if [ -z "$POOL_ID" ]; then
            echo "No cognito_pool_id in SSM — pool already gone, skipping."
            exit 0
          fi

          # SSM can hold a stale ID after a partial destroy. Verify the pool
          # actually exists before trying to update it, otherwise AWS returns
          # ResourceNotFoundException and the step fails.
          if ! aws cognito-idp describe-user-pool \
                --user-pool-id "$POOL_ID" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Pool $POOL_ID no longer exists — skipping."
            exit 0
          fi

          # The pool's attributes_require_verification_before_update=["email"]
          # forces every UpdateUserPool call to also send a matching
          # --auto-verified-attributes, otherwise AWS rejects with
          # "All attributes in AttributesRequireVerificationBeforeUpdate
          # must exist in AutoVerifiedAttributes".
          aws cognito-idp update-user-pool \
            --user-pool-id "$POOL_ID" \
            --deletion-protection INACTIVE \
            --auto-verified-attributes email \
            --user-pool-add-ons AdvancedSecurityMode=ENFORCED \
            --region "$AWS_REGION"

          for i in {1..30}; do
            STATE=$(aws cognito-idp describe-user-pool \
              --user-pool-id "$POOL_ID" --region "$AWS_REGION" \
              --query 'UserPool.DeletionProtection' --output text)
            echo "DeletionProtection=$STATE"
            [ "$STATE" = "INACTIVE" ] && break
            sleep 2
          done

      - name: Terraform destroy
        run: terraform destroy -auto-approve

      # delete-parameters caps at 10 names per call, so batch with xargs.
      - name: Purge SSM parameters
        run: |
          aws ssm describe-parameters --region "$AWS_REGION" \
            --parameter-filters "Key=Name,Option=BeginsWith,Values=$SSM_PREFIX/" \
            --query 'Parameters[].Name' --output text | tr '\t' '\n' | \
          xargs -r -n 10 aws ssm delete-parameters --region "$AWS_REGION" --names
