# Materialises SSM params (written by terraform-deploy.yml) into K8s Secrets.
# Resync every 5 min so rotated values propagate without redeploy.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: chrono-shared
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: chrono-shared
    creationPolicy: Owner
  data:
    - secretKey: COGNITO_USER_POOL_ID
      remoteRef: { key: /chrono-vcs/prod/cognito_pool_id }
    - secretKey: COGNITO_CLIENT_ID
      remoteRef: { key: /chrono-vcs/prod/cognito_client_id }
    - secretKey: COGNITO_CLIENT_SECRET
      remoteRef: { key: /chrono-vcs/prod/cognito_client_secret }
    - secretKey: S3_REPO_BUCKET
      remoteRef: { key: /chrono-vcs/prod/s3_bucket_name }
    - secretKey: SNS_CACHE_INVALIDATION_TOPIC_ARN
      remoteRef: { key: /chrono-vcs/prod/sns_cache_invalidation_topic_arn }
    - secretKey: REPO_CACHE_INVALIDATION_QUEUE_URL
      remoteRef: { key: /chrono-vcs/prod/repo_cache_invalidation_queue_url }
    - secretKey: WORKFLOW_CACHE_INVALIDATION_QUEUE_URL
      remoteRef: { key: /chrono-vcs/prod/workflow_cache_invalidation_queue_url }
    - secretKey: SES_CONFIGURATION_SET_NAME
      remoteRef: { key: /chrono-vcs/prod/ses_configuration_set_name }
    - secretKey: SES_FROM_EMAIL
      remoteRef: { key: /chrono-vcs/prod/ses_from_email }
    - secretKey: INVITE_ACCEPT_BASE_URL
      remoteRef: { key: /chrono-vcs/prod/frontend_url }
    - secretKey: PASSPORT_SECRET_KEY
      remoteRef: { key: /chrono-vcs/prod/passport_secret_key }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: chrono-db
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: chrono-db
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef: { key: /chrono-vcs/prod/database_url_admin }
    - secretKey: IDENTITY_DATABASE_URL
      remoteRef: { key: /chrono-vcs/prod/identity_database_url }
    - secretKey: REPO_DATABASE_URL
      remoteRef: { key: /chrono-vcs/prod/repo_database_url }
    - secretKey: WORKFLOW_DATABASE_URL
      remoteRef: { key: /chrono-vcs/prod/workflow_database_url }
    - secretKey: IDENTITY_DB_PASSWORD
      remoteRef: { key: /chrono-vcs/prod/identity_db_password }
    - secretKey: REPO_DB_PASSWORD
      remoteRef: { key: /chrono-vcs/prod/repo_db_password }
    - secretKey: WORKFLOW_DB_PASSWORD
      remoteRef: { key: /chrono-vcs/prod/workflow_db_password }
