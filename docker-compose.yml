services:
  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    container_name: identity-service
    ports:
      - "8001:8000"
    env_file: .env
    volumes:
      - ./data/efs_drafts:/mnt/efs/drafts  # Local EFS simulation
    networks:
      - chrono_network
    restart: always

networks:
  chrono_network:
    driver: bridge

volumes:
  efs_drafts: