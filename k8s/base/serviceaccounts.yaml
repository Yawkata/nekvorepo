# ServiceAccount names MUST match those in terraform/pod_identity.tf.
# Pod Identity associations bind (cluster, namespace, SA) -> IAM role; a typo
# here means pods start fine but every AWS SDK call fails with "no credentials".
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: identity-service
  namespace: chrono-vcs
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: repo-service
  namespace: chrono-vcs
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workflow-service
  namespace: chrono-vcs
automountServiceAccountToken: true
---
# migrations-runner has no Pod Identity association — it only needs DB
# credentials (which come via ESO), not AWS APIs. Kept separate from app SAs
# so a compromise of a long-running app pod can't reuse migration privileges.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: migrations-runner
  namespace: chrono-vcs
automountServiceAccountToken: false
---
# frontend never calls AWS APIs directly; no Pod Identity needed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: chrono-vcs
automountServiceAccountToken: false
