name: 'Terraform Infrastructure Pipeline'

on:
  push:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply
        - destroy

permissions:
  id-token: write
  contents: read 

env:
  TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
  TF_VAR_allowed_ips: ${{ secrets.TF_VAR_ALLOWED_IPS }}
  TF_VAR_ses_sender_email: ${{ secrets.TF_VAR_SES_SENDER_EMAIL }}
  TF_VAR_frontend_url: ${{ secrets.TF_VAR_FRONTEND_URL }}
  AWS_REGION: "us-east-1"

jobs:
  terraform-plan:
    name: 'Terraform'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::064057453791:role/GitHubActions-OIDC-Role
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.14.6"

    - name: Terraform Init
      run: terraform init -upgrade

    - name: Terraform Format
      run: terraform fmt -check

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      id: plan
      run: terraform plan -input=false -no-color -out=tfplan

    - name: Upload Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tfplan
        path: terraform/tfplan

  terraform-execute:
    name: 'Terraform Execute'
    runs-on: ubuntu-latest
    needs: terraform-plan

    if: github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'plan')
    
    environment: production 

    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::064057453791:role/GitHubActions-OIDC-Role
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform Apply
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Push outputs to SSM
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        run: |
          OUTPUTS=$(terraform output -json)

          push_param() {
            local name=$1 value=$2 type=$3
            aws ssm put-parameter \
              --name "/chrono/dev/$name" \
              --value "$value" \
              --type "$type" \
              --overwrite \
              --region "$AWS_REGION"
          }

          push_param "cognito_pool_id"       "$(echo "$OUTPUTS" | jq -r '.cognito_pool_id.value')"       "String"
          push_param "cognito_client_id"     "$(echo "$OUTPUTS" | jq -r '.cognito_client_id.value')"     "String"
          push_param "cognito_client_secret" "$(echo "$OUTPUTS" | jq -r '.cognito_client_secret.value')" "SecureString"
          push_param "dev_access_key_id"     "$(echo "$OUTPUTS" | jq -r '.dev_access_key_id.value')"     "String"
          push_param "dev_secret_access_key" "$(echo "$OUTPUTS" | jq -r '.dev_secret_access_key.value')" "SecureString"
          push_param "s3_bucket_name"        "$(echo "$OUTPUTS" | jq -r '.s3_bucket_name.value')"        "String"
          push_param "rds_endpoint"          "$(echo "$OUTPUTS" | jq -r '.rds_endpoint.value')"          "String"
          push_param "sqs_cache_invalidation_queue_url" "$(echo "$OUTPUTS" | jq -r '.sqs_cache_invalidation_queue_url.value')" "String"
          push_param "ses_sender_email"      "$(echo "$OUTPUTS" | jq -r '.ses_sender_email.value')"      "String"
          push_param "frontend_url"          "$(echo "$OUTPUTS" | jq -r '.frontend_url.value')"          "String"

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve

