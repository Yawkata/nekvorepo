apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: chrono-vcs
  labels: { app.kubernetes.io/name: identity-service, app.kubernetes.io/component: backend }
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app.kubernetes.io/name: identity-service }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-service
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: identity-service
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      # Chainguard distroless base runs as UID 65532 ("nonroot"). fsGroup
      # matches so any emptyDir writes are group-writable by the process.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: { app.kubernetes.io/name: identity-service }
      containers:
        - name: app
          image: identity-service  # rewritten by kustomize `images:` + newTag
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8000, protocol: TCP }
          envFrom:
            - configMapRef: { name: identity-service-config }
            - secretRef:    { name: db-app-credentials }
            - secretRef:    { name: identity-cognito }
            - secretRef:    { name: identity-misc }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { memory: 512Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          # App exposes /ping (cheap liveness) and /health (deep readiness
          # that touches RDS + Cognito). Startup uses /ping so slow first
          # imports don't trip the readiness dependency chain.
          startupProbe:
            httpGet: { path: /ping, port: http }
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /ping, port: http }
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: chrono-vcs
spec:
  type: ClusterIP
  selector: { app.kubernetes.io/name: identity-service }
  ports:
    - { name: http, port: 8000, targetPort: http, protocol: TCP }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: identity-service
  namespace: chrono-vcs
spec:
  minAvailable: 1
  selector:
    matchLabels: { app.kubernetes.io/name: identity-service }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: identity-service
  namespace: chrono-vcs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: identity-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 80 }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
