name: 'Terraform Infrastructure Pipeline'

on:
  push:
    branches: [ "main" ]

  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply
        - destroy

permissions:
  id-token: write
  contents: read 

env:
  TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
  TF_VAR_allowed_ips: ${{ secrets.TF_VAR_ALLOWED_IPS }}
  TF_VAR_cluster_admin_principal_arns: ${{ vars.TF_VAR_CLUSTER_ADMIN_PRINCIPAL_ARNS }}
  AWS_REGION: "us-east-1"

jobs:
  terraform-plan:
    name: 'Terraform'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./terraform
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::064057453791:role/GitHubActions-OIDC-Role
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.14.6"

    - name: Terraform Init
      run: terraform init -upgrade

    - name: Terraform Format
      run: terraform fmt -check

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      id: plan
      run: terraform plan -input=false -no-color -out=tfplan

    - name: Upload Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tfplan
        path: terraform/tfplan

  # ---------------------------------------------------------------------------
  # Pre-destroy cleanup of every AWS resource that Kubernetes controllers
  # create OUTSIDE Terraform's view.
  #
  # Why this job exists:
  #   Controllers running inside the cluster (AWS Load Balancer Controller,
  #   ExternalDNS, Karpenter, the EBS/EFS CSI drivers) create real AWS
  #   resources — ALBs, NLBs, EC2 instances, EBS volumes, Route 53 records —
  #   that Terraform never learns about. If we run `terraform destroy` while
  #   those exist, destroy either hangs (VPC subnets still in use by ALB
  #   ENIs, hosted zone has records) or orphans paid resources we forget
  #   about for weeks.
  #
  # Strategy (ordered, each stage blocks until the previous is quiescent):
  #   1. Delete Ingresses          → ALB Controller deletes ALBs + target groups.
  #   2. Delete LoadBalancer Svcs  → in-tree / AWS LB Controller deletes NLBs/CLBs.
  #   3. Delete Karpenter objects  → Karpenter terminates its EC2 instances.
  #   4. Delete app namespace      → cascades to PVCs → CSI deletes EBS/EFS APs.
  #                                  ExternalDNS sees Ingress deletions and
  #                                  removes the Route 53 records it owns.
  #   5. Delete orphan PVs         → covers Retain-policy static PVs.
  #   6. Poll AWS APIs until ALBs/NLBs/CLBs in our VPC are gone.
  #   7. Sweep any Route 53 records ExternalDNS failed to clean (belt-and-
  #      suspenders — protects zone deletion).
  #
  # Correctness properties:
  #   - Idempotent: every command tolerates "already gone".
  #   - Safe on fresh destroy: if cluster isn't in state or in AWS, exits 0.
  #   - Does not touch TF-managed records (NS, SOA, ACM validation).
  #   - No fixed sleeps except as inner polling intervals.
  # ---------------------------------------------------------------------------
  kubernetes-cleanup:
    name: 'Kubernetes Pre-Destroy Cleanup'
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: production

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::064057453791:role/GitHubActions-OIDC-Role
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false   # avoid wrapper polluting `terraform output` stdout with "::error::..." lines

      - uses: azure/setup-kubectl@v4
        with:
          version: 'v1.31.0'

      - name: Terraform Init
        run: terraform init

      - name: Resolve cluster, VPC, hosted zone from state
        id: ids
        shell: bash
        run: |
          set -u
          NAME=$(terraform output -raw eks_cluster_name 2>/dev/null || true)
          ZONE_ID=$(terraform output -raw route53_zone_id 2>/dev/null || true)

          # Defensive: reject anything that isn't a plausible Route 53 zone id.
          # Route 53 zone ids are 13-32 chars, alphanumeric. Guards against a
          # future regression where `terraform output` leaks garbage to stdout.
          if ! [[ "$ZONE_ID" =~ ^[A-Z0-9]{13,32}$ ]]; then
            ZONE_ID=""
          fi

          if [ -z "$NAME" ] || ! [[ "$NAME" =~ ^[a-zA-Z0-9][a-zA-Z0-9-_]{0,99}$ ]]; then
            echo "No EKS cluster in Terraform state — nothing to clean."
            echo "cluster_present=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          if ! aws eks describe-cluster --name "$NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Cluster $NAME not present in AWS (already gone?)."
            echo "cluster_present=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=chrono-vcs-vpc" \
            --query 'Vpcs[0].VpcId' --output text --region "$AWS_REGION")

          echo "cluster_present=true"   >>"$GITHUB_OUTPUT"
          echo "cluster_name=$NAME"     >>"$GITHUB_OUTPUT"
          echo "vpc_id=$VPC_ID"         >>"$GITHUB_OUTPUT"
          echo "zone_id=${ZONE_ID:-}"   >>"$GITHUB_OUTPUT"
          echo "Resolved cluster=$NAME vpc=$VPC_ID zone=${ZONE_ID:-<none>}"

      - name: Configure kubectl
        if: steps.ids.outputs.cluster_present == 'true'
        run: |
          aws eks update-kubeconfig \
            --name "${{ steps.ids.outputs.cluster_name }}" \
            --region "$AWS_REGION"
          kubectl cluster-info

      - name: Delete Ingresses (releases ALBs + ExternalDNS records)
        if: steps.ids.outputs.cluster_present == 'true'
        shell: bash
        run: |
          kubectl delete ingress --all -A \
            --ignore-not-found --timeout=180s --wait=true || true

      - name: Delete LoadBalancer Services (releases NLBs/CLBs)
        if: steps.ids.outputs.cluster_present == 'true'
        shell: bash
        run: |
          kubectl get svc -A -o json \
            | jq -r '.items[] | select(.spec.type=="LoadBalancer")
                    | "\(.metadata.namespace) \(.metadata.name)"' \
            | while read -r ns name; do
                [ -z "$ns" ] && continue
                echo "Deleting LoadBalancer service $ns/$name"
                kubectl delete svc "$name" -n "$ns" \
                  --ignore-not-found --timeout=120s || true
              done

      - name: Delete Karpenter NodeClaims & NodePools (terminates EC2)
        if: steps.ids.outputs.cluster_present == 'true'
        shell: bash
        run: |
          # CRDs may not exist if Karpenter was never installed; treat as no-op.
          if kubectl get crd nodeclaims.karpenter.sh >/dev/null 2>&1; then
            kubectl delete nodeclaims --all \
              --ignore-not-found --timeout=240s || true
          fi
          if kubectl get crd nodepools.karpenter.sh >/dev/null 2>&1; then
            kubectl delete nodepools --all \
              --ignore-not-found --timeout=60s || true
          fi

      - name: Delete app namespace (cascades PVCs → EBS/EFS)
        if: steps.ids.outputs.cluster_present == 'true'
        shell: bash
        run: |
          kubectl delete namespace chrono-vcs \
            --ignore-not-found --timeout=240s || true

      - name: Delete orphan PVs (covers Retain-policy static volumes)
        if: steps.ids.outputs.cluster_present == 'true'
        shell: bash
        run: |
          kubectl delete pv --all \
            --ignore-not-found --timeout=120s || true

      - name: Wait for ALBs / NLBs / CLBs in our VPC to disappear
        if: steps.ids.outputs.cluster_present == 'true' && steps.ids.outputs.vpc_id != 'None'
        shell: bash
        env:
          VPC_ID: ${{ steps.ids.outputs.vpc_id }}
        run: |
          deadline=$(( $(date +%s) + 600 ))   # 10 min hard ceiling
          while : ; do
            V2=$(aws elbv2 describe-load-balancers --region "$AWS_REGION" \
                  --query "length(LoadBalancers[?VpcId=='$VPC_ID'])" --output text)
            V1=$(aws elb describe-load-balancers --region "$AWS_REGION" \
                  --query "length(LoadBalancerDescriptions[?VPCId=='$VPC_ID'])" --output text)
            if [ "$V2" = "0" ] && [ "$V1" = "0" ]; then
              echo "All load balancers in VPC $VPC_ID are gone."
              break
            fi
            now=$(date +%s)
            if [ "$now" -ge "$deadline" ]; then
              echo "::warning::Timed out after 10m waiting for LBs ($V2 v2, $V1 v1 remaining). Destroy may fail — investigate manually."
              break
            fi
            echo "Still waiting: $V2 ALB/NLB + $V1 CLB in VPC $VPC_ID..."
            sleep 15
          done

      - name: Wait for Karpenter-tagged EC2 instances to terminate
        if: steps.ids.outputs.cluster_present == 'true'
        shell: bash
        env:
          CLUSTER_NAME: ${{ steps.ids.outputs.cluster_name }}
        run: |
          deadline=$(( $(date +%s) + 600 ))
          while : ; do
            # Karpenter tags its instances with karpenter.sh/nodepool.
            COUNT=$(aws ec2 describe-instances --region "$AWS_REGION" \
              --filters \
                "Name=tag:karpenter.sh/nodepool,Values=*" \
                "Name=tag:eks:cluster-name,Values=$CLUSTER_NAME" \
                "Name=instance-state-name,Values=pending,running,stopping,shutting-down" \
              --query 'length(Reservations[].Instances[])' --output text)
            if [ "$COUNT" = "0" ]; then
              echo "No Karpenter instances left."
              break
            fi
            now=$(date +%s)
            if [ "$now" -ge "$deadline" ]; then
              echo "::warning::Timed out waiting for Karpenter instances ($COUNT remaining)."
              break
            fi
            echo "$COUNT Karpenter instances still terminating..."
            sleep 15
          done

      - name: Sweep residual Route 53 records (safety net for ExternalDNS)
        if: steps.ids.outputs.cluster_present == 'true' && steps.ids.outputs.zone_id != ''
        shell: bash
        env:
          ZONE_ID: ${{ steps.ids.outputs.zone_id }}
        run: |
          # Strategy: delete every record in the zone EXCEPT:
          #   - NS / SOA at the apex (Route 53 won't let you delete these; TF
          #     deletes them with the zone).
          #   - ACM validation CNAMEs (names starting with '_') — TF owns them
          #     and deletes them before destroying the zone.
          # Everything else must have come from ExternalDNS or a human; it
          # blocks zone deletion, so we remove it.
          aws route53 list-resource-record-sets --hosted-zone-id "$ZONE_ID" \
            --output json \
            | jq -c '.ResourceRecordSets[]
                    | select(.Type != "NS" and .Type != "SOA")
                    | select(.Name | startswith("_") | not)' \
            | while read -r rec; do
                name=$(echo "$rec" | jq -r '.Name')
                type=$(echo "$rec" | jq -r '.Type')
                echo "Deleting residual record $name $type"
                batch=$(jq -n --argjson r "$rec" \
                  '{Changes: [{Action: "DELETE", ResourceRecordSet: $r}]}')
                aws route53 change-resource-record-sets \
                  --hosted-zone-id "$ZONE_ID" \
                  --change-batch "$batch" >/dev/null 2>&1 || true
              done
          echo "Route 53 residual sweep complete."

  terraform-execute:
    name: 'Terraform Execute'
    runs-on: ubuntu-latest
    needs: [terraform-plan, kubernetes-cleanup]

    # kubernetes-cleanup only runs on destroy; for apply/push it is skipped.
    # The `always()` wrapper lets terraform-execute proceed even when
    # kubernetes-cleanup is skipped (default 'needs' semantics would block it).
    if: |
      always() &&
      (needs.terraform-plan.result == 'success') &&
      (needs.kubernetes-cleanup.result == 'success' || needs.kubernetes-cleanup.result == 'skipped') &&
      (github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'plan'))
    
    environment: production 

    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::064057453791:role/GitHubActions-OIDC-Role
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform Apply
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Push outputs to SSM
        if: github.event_name == 'push' || github.event.inputs.action == 'apply'
        run: |
          OUTPUTS=$(terraform output -json)

          push_param() {
            local name=$1 value=$2 type=$3
            aws ssm put-parameter \
              --name "/chrono/dev/$name" \
              --value "$value" \
              --type "$type" \
              --overwrite \
              --region "$AWS_REGION"
          }

          push_param "cognito_pool_id"       "$(echo "$OUTPUTS" | jq -r '.cognito_pool_id.value')"       "String"
          push_param "cognito_client_id"     "$(echo "$OUTPUTS" | jq -r '.cognito_client_id.value')"     "String"
          push_param "cognito_client_secret" "$(echo "$OUTPUTS" | jq -r '.cognito_client_secret.value')" "SecureString"
          push_param "dev_access_key_id"     "$(echo "$OUTPUTS" | jq -r '.dev_access_key_id.value')"     "String"
          push_param "dev_secret_access_key" "$(echo "$OUTPUTS" | jq -r '.dev_secret_access_key.value')" "SecureString"
          push_param "s3_bucket_name"        "$(echo "$OUTPUTS" | jq -r '.s3_bucket_name.value')"        "String"
          push_param "rds_endpoint"          "$(echo "$OUTPUTS" | jq -r '.rds_endpoint.value')"          "String"
          push_param "sns_cache_invalidation_topic_arn"      "$(echo "$OUTPUTS" | jq -r '.sns_cache_invalidation_topic_arn.value')"      "String"
          push_param "repo_cache_invalidation_queue_url"     "$(echo "$OUTPUTS" | jq -r '.repo_cache_invalidation_queue_url.value')"     "String"
          push_param "workflow_cache_invalidation_queue_url" "$(echo "$OUTPUTS" | jq -r '.workflow_cache_invalidation_queue_url.value')" "String"
          push_param "ses_configuration_set_name" "$(echo "$OUTPUTS" | jq -r '.ses_configuration_set_name.value')" "String"

      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve

