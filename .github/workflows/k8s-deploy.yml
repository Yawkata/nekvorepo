name: k8s-deploy

# Builds + pushes a container image per service to ECR (tag = git SHA),
# renders the per-env overlay with TF-output values substituted in,
# applies via kubectl, runs schema migrations, waits for rollout.
#
# Triggered manually (so devs can pick environment) and on push to main
# for staging. Prod deploys are manual-only.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, prod]
        default: staging
      services:
        description: "Comma-separated subset, or 'all'"
        required: false
        default: all
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - "services/**"
      - "frontend/**"
      - ".github/workflows/k8s-deploy.yml"

concurrency:
  group: k8s-deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC -> AWS
  contents: read

env:
  AWS_REGION: us-east-1
  PROJECT: chrono-vcs

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    strategy:
      fail-fast: true
      matrix:
        include:
          # Backend services share code via `services/shared`, so their
          # Dockerfiles reference repo-root-relative paths. Build context
          # must be the repo root.
          - service: identity-service
            context: .
            file: services/identity-service/Dockerfile
          - service: repo-service
            context: .
            file: services/repo-service/Dockerfile
          - service: workflow-service
            context: .
            file: services/workflow-service/Dockerfile
          - service: database-migrations
            context: .
            file: services/database-migrations/Dockerfile
          # Frontend is self-contained; its Dockerfile COPYs `package.json`
          # directly (no ../ references), so context is its own directory.
          - service: frontend
            context: frontend
            file: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Skip if Dockerfile absent
        id: exists
        run: |
          if [ -f "${{ matrix.file }}" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "::warning::${{ matrix.file }} not found — skipping build"
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        if: steps.exists.outputs.build == 'true'
        with:
          role-to-assume: arn:aws:iam::064057453791:role/GitHubActions-OIDC-Role
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        if: steps.exists.outputs.build == 'true'
        id: ecr

      - uses: docker/setup-buildx-action@v3
        if: steps.exists.outputs.build == 'true'

      - name: Build & push
        if: steps.exists.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          # Per-service context/file from the matrix — backends build from
          # repo root (to pull in services/shared); frontend builds from its
          # own directory (its Dockerfile uses relative COPYs).
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.PROJECT }}/${{ matrix.service }}:${{ steps.vars.outputs.image_tag }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    env:
      ENV_NAME: ${{ github.event.inputs.environment || 'staging' }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::064057453791:role/GitHubActions-OIDC-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kustomize + kubectl
        run: |
          curl -sLo /usr/local/bin/kubectl https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl
          chmod +x /usr/local/bin/kubectl
          curl -sSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "${PROJECT}-${ENV_NAME}"
          kubectl version --short || true

      - name: Pull TF outputs into env
        id: tf
        run: |
          set -euo pipefail
          # Read outputs from the infra S3 backend via `terraform output`.
          # Requires the `terraform` CLI available on the runner.
          cd terraform
          terraform init -backend=true -input=false >/dev/null
          {
            echo "EFS_FILE_SYSTEM_ID=$(terraform output -raw efs_file_system_id)"
            echo "EFS_ACCESS_POINT_ID=$(terraform output -raw efs_access_point_id)"
            echo "S3_BUCKET_NAME=$(terraform output -raw s3_bucket_name)"
            echo "SES_FROM_EMAIL=$(terraform output -raw ses_sender_email)"
            echo "SES_CONFIGURATION_SET_NAME=$(terraform output -raw ses_configuration_set_name)"
            echo "SNS_CACHE_INVALIDATION_TOPIC_ARN=$(terraform output -raw sns_cache_invalidation_topic_arn)"
            echo "REPO_CACHE_INVALIDATION_QUEUE_URL=$(terraform output -raw repo_cache_invalidation_queue_url)"
            echo "WORKFLOW_CACHE_INVALIDATION_QUEUE_URL=$(terraform output -raw workflow_cache_invalidation_queue_url)"
            echo "FRONTEND_URL=$(terraform output -raw frontend_url)"
            echo "ACM_CERTIFICATE_ARN=$(terraform output -raw acm_certificate_arn 2>/dev/null || echo '')"
            echo "DOMAIN_NAME=${{ vars.DOMAIN_NAME }}"
          } >> "$GITHUB_ENV"

      - name: Sync k8s Secrets (MVP — direct from GH secrets + TF outputs)
        env:
          DB_PASSWORD: ${{ secrets.TF_VAR_DB_PASSWORD }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
        run: |
          set -euo pipefail
          cd terraform
          DB_HOST=$(terraform output -raw rds_endpoint)
          COG_ID=$(terraform output -raw cognito_client_id)
          COG_SECRET=$(terraform output -raw cognito_client_secret)
          COG_POOL=$(terraform output -raw cognito_pool_id)
          cd ..

          # Ensure namespace exists on first deploy (before kustomize apply).
          kubectl create namespace chrono-vcs \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n chrono-vcs create secret generic db-app-credentials \
            --from-literal=DB_USER=postgres_admin \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            --from-literal=DB_HOST="$DB_HOST" \
            --from-literal=DB_PORT=5432 \
            --from-literal=DB_NAME=chrono_vcs_db \
            --from-literal=DATABASE_URL="postgresql://postgres_admin:${DB_PASSWORD}@${DB_HOST}:5432/chrono_vcs_db" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n chrono-vcs create secret generic identity-cognito \
            --from-literal=COGNITO_CLIENT_ID="$COG_ID" \
            --from-literal=COGNITO_CLIENT_SECRET="$COG_SECRET" \
            --from-literal=COGNITO_USER_POOL_ID="$COG_POOL" \
            --dry-run=client -o yaml | kubectl apply -f -

          # App reads PASSPORT_SECRET_KEY (min 32 chars). The GH secret is
          # named JWT_SIGNING_KEY for historical reasons; we remap on the way in.
          kubectl -n chrono-vcs create secret generic identity-misc \
            --from-literal=PASSPORT_SECRET_KEY="$JWT_SIGNING_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Set image tags in overlay
        working-directory: k8s/overlays/${{ env.ENV_NAME }}
        run: |
          ECR="$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${AWS_REGION}.amazonaws.com"
          for svc in identity-service repo-service workflow-service frontend database-migrations; do
            kustomize edit set image \
              "${svc}=${ECR}/${PROJECT}/${svc}:${IMAGE_TAG}"
          done

      - name: Render + envsubst + apply
        run: |
          set -euo pipefail
          # envsubst replaces ${VAR} from the overlay kustomization with the
          # TF-output values exported above. Any unset variable becomes empty
          # (desired: missing domain -> blank hostname -> ALB rejects until set).
          kustomize build "k8s/overlays/${ENV_NAME}" \
            | envsubst \
            | tee /tmp/manifest.yaml \
            | kubectl apply -f -

      - name: Run migrations
        run: |
          set -euo pipefail
          # Job is immutable once template is set; delete any prior instance
          # before re-applying. --ignore-not-found makes first-run idempotent.
          kubectl -n chrono-vcs delete job db-migrate --ignore-not-found
          # Re-apply just the migration Job (kustomize already applied it; re-render for freshness)
          kustomize build "k8s/overlays/${ENV_NAME}" \
            | envsubst \
            | kubectl apply -f - -l app.kubernetes.io/name=db-migrate || true
          kubectl -n chrono-vcs wait --for=condition=complete job/db-migrate --timeout=15m

      - name: Wait for rollouts
        run: |
          for d in identity-service repo-service workflow-service frontend; do
            kubectl -n chrono-vcs rollout status deploy/$d --timeout=10m
          done

      - name: Post-deploy sanity
        run: |
          kubectl -n chrono-vcs get deploy,svc,ingress,hpa,pdb
          kubectl -n chrono-vcs get externalsecrets.external-secrets.io
