# Dynamic EFS provisioning via the access-point mode StorageClass defined
# in terraform. Each draft gets its own access point so pods can't read
# each other's trees.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: efs-drafts
spec:
  accessModes: [ReadWriteMany]
  storageClassName: efs-sc
  resources:
    requests:
      storage: 100Gi
