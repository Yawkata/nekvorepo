# External Secrets Operator — reads SSM parameters populated by terraform
# and materialises them as native K8s Secrets. Pod Identity on the ESO
# service account (in kube-system) supplies AWS creds; no static keys.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-ssm
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      # Use the ESO controller's own Pod Identity session — no service account
      # reference needed because ESO runs as the identity we want.
