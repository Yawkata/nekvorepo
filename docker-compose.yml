services:
  database-migrations:
    build:
      context: .
      dockerfile: services/database-migrations/Dockerfile
    container_name: nekvo-migrator
    env_file: .env
    # Ensure local container can talk to AWS (usually requires AWS_ACCESS_KEY if using IAM auth)
    environment:
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - chrono_network

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    container_name: identity-service
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      database-migrations:
        condition: service_completed_successfully
    volumes:
      - ./data/efs_drafts:/mnt/efs/drafts  # Local EFS simulation
    networks:
      - chrono_network
    restart: always

networks:
  chrono_network:
    driver: bridge

volumes:
  efs_drafts: